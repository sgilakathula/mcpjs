name: CI/CD — Build & Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  # ── 2. Build Native Binaries (matrix) ────────────────────────────────────────
  build:
    name: Build — ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.host }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: macOS x64
            host: macos-latest
            target: x86_64-apple-darwin
            build: |
              yarn build
              strip -x *.node

          - name: macOS ARM64 (Apple Silicon)
            host: macos-latest
            target: aarch64-apple-darwin
            build: |
              sudo rm -Rf /Library/Developer/CommandLineTools/SDKs/*
              yarn build --target aarch64-apple-darwin
              strip -x *.node

          - name: Windows x64
            host: windows-latest
            target: x86_64-pc-windows-msvc
            build: yarn build

          - name: Windows ARM64
            host: windows-latest
            target: aarch64-pc-windows-msvc
            build: yarn build --target aarch64-pc-windows-msvc

          - name: Linux x64 (GNU)
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: |
              set -e
              yarn build --target x86_64-unknown-linux-gnu
              strip *.node

          - name: Linux x64 (musl)
            host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |
              set -e
              yarn build
              strip *.node

          - name: Linux ARM64 (GNU)
            host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
            build: |
              set -e
              yarn build --target aarch64-unknown-linux-gnu
              aarch64-unknown-linux-gnu-strip *.node

          - name: Linux ARM64 (musl)
            host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |
              set -e
              yarn build --target aarch64-unknown-linux-musl
              /aarch64-linux-musl-cross/bin/aarch64-linux-musl-strip *.node

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      - name: Install dependencies
        run: yarn install

      - name: Build (Docker)
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: >-
            --user 0:0
            -v ${{ github.workspace }}/.cargo-cache/git/db:/usr/local/cargo/git/db
            -v ${{ github.workspace }}/.cargo/registry/cache:/usr/local/cargo/registry/cache
            -v ${{ github.workspace }}/.cargo/registry/src:/usr/local/cargo/registry/src
            -v ${{ github.workspace }}:/build
            -w /build
          run: ${{ matrix.settings.build }}

      - name: Build (Native)
        if: ${{ !matrix.settings.docker }}
        run: ${{ matrix.settings.build }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: '*.node'
          if-no-files-found: error

  # ── 3. Run Tests Against Built Binaries ─────────────────────────────────────
  test:
    name: Test — ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.host }}
    needs: build
    strategy:
      matrix:
        settings:
          - name: macOS x64
            host: macos-latest
            target: x86_64-apple-darwin
          - name: Windows x64
            host: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Linux x64 (GNU)
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - name: Install dependencies
        run: yarn install
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
      - name: Run tests
        run: yarn test

  # ── 4. Publish to npm ────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move binaries to npm packages
        run: yarn artifacts

      - name: Publish to npm
        run: |
          npm config set provenance true
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
